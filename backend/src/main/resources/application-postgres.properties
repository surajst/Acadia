# Postgres profile — activate with -Dspring.profiles.active=postgres (or
# SPRING_PROFILES_ACTIVE=postgres). Provide the env vars below with a real
# database connection before using this profile; it is not wired to any live
# database by default. DB_HOST/DB_PORT/DB_NAME are separate (rather than one
# DB_URL) because managed-Postgres providers like Render expose connection
# details as discrete fields, not a ready-made jdbc: URL.
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:schoolos}
spring.datasource.username=${DB_USERNAME:schoolos}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.sql.init.mode=always
