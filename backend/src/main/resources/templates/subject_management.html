<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" style="height:100vh; overflow:hidden">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subjects &middot; ACADIA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 4px; }
        .glass-panel {
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(30, 41, 59, 0.8);
        }
    </style>
    <link rel="icon" type="image/png" href="/images/acadia-logo.png">
    <link rel="shortcut icon" href="/favicon.ico">
</head>
<body class="bg-[#0b0f19] text-slate-200 font-sans overflow-hidden flex flex-col selection:bg-indigo-500/30" style="height:100vh; overflow:hidden; display:flex; flex-direction:column">

    <header class="bg-[#0f172a] border-b border-slate-800/60 sticky top-0 z-40 backdrop-blur-md bg-opacity-95 shrink-0">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-20 flex items-center justify-between">
            <div style="display:flex; align-items:center; gap:10px;">
                <img src="/images/acadia-logo.png" alt="ACADIA" style="height:32px; mix-blend-mode:screen;">
                <span style="font-size:16px; font-weight:600; color:white; letter-spacing:2px;">ACADIA</span>
            </div>
            <div class="flex items-center gap-4">
                <a href="/web/admin/dashboard" class="text-slate-400 hover:text-white transition-colors cursor-pointer border border-slate-800 p-2 rounded-xl bg-slate-900/50 hover:bg-slate-800">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/></svg>
                </a>
                <div>
                    <h1 class="text-2xl font-bold tracking-tight bg-gradient-to-r from-white via-slate-200 to-indigo-400 bg-clip-text text-transparent">
                        Subjects
                    </h1>
                    <p class="text-xs text-slate-400 mt-0.5 font-medium">Manage the subject catalog and per-grade assignment</p>
                </div>
            </div>
            <div></div>
        </div>
    </header>

    <div id="global-scroll-wrapper" style="flex:1; overflow-y:auto; min-height:0;">
        <main class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 py-8 space-y-8">

            <!-- Subject catalog -->
            <section class="glass-panel rounded-2xl p-6">
                <div class="flex items-center justify-between mb-4">
                    <h2 class="text-lg font-semibold text-white">Subject Catalog</h2>
                </div>

                <table class="w-full text-sm">
                    <thead>
                        <tr class="text-left text-slate-400 border-b border-slate-800">
                            <th class="py-2 pr-4">Code</th>
                            <th class="py-2 pr-4">Display Name</th>
                            <th class="py-2 pr-4">Status</th>
                            <th class="py-2 pr-4">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="subjectRows"></tbody>
                </table>

                <form id="createSubjectForm" class="mt-6 flex flex-wrap gap-3 items-end">
                    <div>
                        <label class="block text-xs text-slate-400 mb-1">Code</label>
                        <input id="newCode" required class="bg-slate-900/70 border border-slate-700/60 rounded-xl text-sm text-slate-200 px-3 py-2" placeholder="e.g. COMPUTER_SCIENCE">
                    </div>
                    <div>
                        <label class="block text-xs text-slate-400 mb-1">Display Name</label>
                        <input id="newDisplayName" required class="bg-slate-900/70 border border-slate-700/60 rounded-xl text-sm text-slate-200 px-3 py-2" placeholder="e.g. Computer Science">
                    </div>
                    <div>
                        <label class="block text-xs text-slate-400 mb-1">Color (optional)</label>
                        <input id="newColorHex" type="color" class="bg-slate-900/70 border border-slate-700/60 rounded-xl h-10 w-16 px-1">
                    </div>
                    <button type="submit" class="bg-indigo-600 hover:bg-indigo-500 text-white text-sm font-medium px-4 py-2 rounded-xl transition-colors">Add Subject</button>
                </form>
            </section>

            <!-- Per-grade assignment -->
            <section class="glass-panel rounded-2xl p-6">
                <h2 class="text-lg font-semibold text-white mb-4">Grade Subject Assignment</h2>
                <div class="flex items-center gap-3 mb-4">
                    <select id="gradeSelect" class="bg-slate-900/70 border border-slate-700/60 rounded-xl text-sm text-slate-200 px-4 py-2"></select>
                </div>
                <div id="gradeSubjectChecklist" class="grid grid-cols-2 sm:grid-cols-3 gap-3 mb-4"></div>
                <button id="saveGradeSubjects" class="bg-indigo-600 hover:bg-indigo-500 text-white text-sm font-medium px-4 py-2 rounded-xl transition-colors">Save Grade Subjects</button>
            </section>
        </main>
    </div>

    <script th:inline="javascript">
        let allSubjects = [];

        async function loadSubjects() {
            const res = await fetch('/api/admin/subjects');
            allSubjects = await res.json();
            renderSubjectRows();
            renderGradeChecklist();
        }

        function renderSubjectRows() {
            const tbody = document.getElementById('subjectRows');
            tbody.innerHTML = allSubjects.map(s => `
                <tr class="border-b border-slate-800/60">
                    <td class="py-2 pr-4 font-mono text-slate-400">${s.code}</td>
                    <td class="py-2 pr-4" id="name-${s.id}">${s.displayName}</td>
                    <td class="py-2 pr-4">${s.active ? '<span class="text-green-400">Active</span>' : '<span class="text-slate-500">Inactive</span>'}</td>
                    <td class="py-2 pr-4 space-x-2">
                        <button onclick="renameSubject('${s.id}')" class="text-indigo-400 hover:text-indigo-300 text-xs">Rename</button>
                        <button onclick="toggleActive('${s.id}', ${!s.active})" class="text-xs ${s.active ? 'text-red-400 hover:text-red-300' : 'text-green-400 hover:text-green-300'}">${s.active ? 'Deactivate' : 'Activate'}</button>
                    </td>
                </tr>
            `).join('');
        }

        async function renameSubject(id) {
            const newName = prompt('New display name:');
            if (!newName) return;
            await fetch(`/api/admin/subjects/${id}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ displayName: newName })
            });
            loadSubjects();
        }

        async function toggleActive(id, activate) {
            await fetch(`/api/admin/subjects/${id}/${activate ? 'activate' : 'deactivate'}`, { method: 'POST' });
            loadSubjects();
        }

        document.getElementById('createSubjectForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const code = document.getElementById('newCode').value.trim().toUpperCase().replace(/\s+/g, '_');
            const displayName = document.getElementById('newDisplayName').value.trim();
            const colorHex = document.getElementById('newColorHex').value;
            await fetch('/api/admin/subjects', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ code, displayName, colorHex })
            });
            e.target.reset();
            loadSubjects();
        });

        async function loadGrades() {
            const res = await fetch('/api/admin/subjects/grades');
            const grades = await res.json();
            const select = document.getElementById('gradeSelect');
            select.innerHTML = grades.map(g => `<option value="${g}">${g}</option>`).join('');
            select.addEventListener('change', renderGradeChecklist);
            if (grades.length > 0) renderGradeChecklist();
        }

        async function renderGradeChecklist() {
            const select = document.getElementById('gradeSelect');
            const grade = select.value;
            const checklist = document.getElementById('gradeSubjectChecklist');
            if (!grade || allSubjects.length === 0) { checklist.innerHTML = ''; return; }

            const res = await fetch(`/api/admin/subjects/grades/${encodeURIComponent(grade)}`);
            const assigned = await res.json();
            const assignedIds = new Set(assigned.map(s => s.id));

            checklist.innerHTML = allSubjects.filter(s => s.active).map(s => `
                <label class="flex items-center gap-2 text-sm text-slate-300">
                    <input type="checkbox" value="${s.id}" ${assignedIds.has(s.id) ? 'checked' : ''} class="grade-subject-checkbox rounded border-slate-700 bg-slate-900">
                    ${s.displayName}
                </label>
            `).join('');
        }

        document.getElementById('saveGradeSubjects').addEventListener('click', async () => {
            const grade = document.getElementById('gradeSelect').value;
            if (!grade) return;
            const subjectIds = Array.from(document.querySelectorAll('.grade-subject-checkbox:checked')).map(cb => cb.value);
            await fetch(`/api/admin/subjects/grades/${encodeURIComponent(grade)}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ subjectIds })
            });
            alert('Saved.');
        });

        loadSubjects();
        loadGrades();
    </script>
</body>
</html>
