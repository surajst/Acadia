<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" style="height:100vh; overflow:hidden">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Your School &middot; ACADIA</title>
    <style>
        body {
            background: radial-gradient(circle at center, rgba(59, 30, 120, 0.3) 0%, #050A1A 60%);
            background-color: #050A1A;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0; padding: 0; height: 100vh; overflow: hidden;
            display: flex; flex-direction: column;
        }
        main { flex: 1; overflow-y: auto; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .card {
            width: 100%; max-width: 460px;
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            padding: 32px 40px;
            box-sizing: border-box;
        }
        .logo-img { width: 200px; display: block; margin: 0 auto 4px; }
        .divider { border-top: 1px solid rgba(255, 255, 255, 0.08); margin: 24px 0; }
        .title { color: #fff; font-size: 22px; font-weight: 600; text-align: center; margin: 16px 0 8px 0; }
        .subtitle { color: rgba(255,255,255,0.5); font-size: 14px; text-align: center; margin: 0 0 28px 0; }
        .form-group { margin-bottom: 12px; }
        .form-label { color: #fff; font-size: 13px; font-weight: 500; margin-bottom: 6px; display: block; text-align: left; }
        .form-input {
            width: 100%; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12);
            border-radius: 10px; padding: 12px 16px; color: #fff; font-size: 15px; box-sizing: border-box;
            font-family: inherit;
        }
        .form-input:focus { border-color: #6366F1; box-shadow: 0 0 0 3px rgba(99,102,241,0.15); outline: none; }
        .btn-submit {
            width: 100%; height: 48px; border-radius: 10px;
            background: linear-gradient(to right, #4F46E5, #7C3AED);
            color: #fff; font-weight: 600; font-size: 15px; margin-top: 16px; border: none; cursor: pointer;
            font-family: inherit;
        }
        .btn-submit:disabled { opacity: 0.6; cursor: not-allowed; }
        .error-msg {
            background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.2); border-radius: 8px;
            padding: 12px; margin-bottom: 20px; text-align: center; color: #fca5a5; font-size: 13px; display: none;
        }
        .footer-text { color: rgba(255,255,255,0.25); font-size: 11px; text-align: center; margin-top: 20px; }
        .signin-link { color: #a5b4fc; text-decoration: none; }
    </style>
    <link rel="icon" type="image/png" href="/images/acadia-logo.png">
    <link rel="shortcut icon" href="/favicon.ico">
</head>
<body>
    <main>
        <div class="card">
            <img src="/images/acadia-logo.png" alt="ACADIA" class="logo-img">
            <div class="divider"></div>
            <h1 class="title">Create your school</h1>
            <p class="subtitle">Set up a new ACADIA workspace in a minute</p>

            <div id="errorMsg" class="error-msg"></div>

            <form id="signupForm">
                <div class="form-group">
                    <label class="form-label">School Name</label>
                    <input type="text" id="schoolName" class="form-input" placeholder="Greenwood High" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Subdomain</label>
                    <input type="text" id="subdomain" class="form-input" placeholder="greenwood" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Your Full Name</label>
                    <input type="text" id="adminFullName" class="form-input" placeholder="Jane Smith" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Your Email</label>
                    <input type="email" id="adminEmail" class="form-input" placeholder="admin@yourschool.edu" required>
                </div>
                <div class="form-group" style="margin-bottom: 0;">
                    <label class="form-label">Password</label>
                    <input type="password" id="adminPassword" class="form-input" placeholder="Choose a password" required minlength="8">
                </div>
                <button type="submit" id="submitBtn" class="btn-submit">Create School</button>
            </form>

            <div class="footer-text">
                Already have an account? <a href="/login" class="signin-link">Sign in</a>
            </div>
        </div>
    </main>

    <!-- Hidden form used to establish a real session after signup, via the normal /login flow -->
    <form id="loginBridgeForm" action="/login" method="POST" style="display:none">
        <input type="hidden" name="username" id="bridgeUsername">
        <input type="hidden" name="password" id="bridgePassword">
    </form>

    <script>
        document.getElementById('signupForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const errorMsg = document.getElementById('errorMsg');
            const submitBtn = document.getElementById('submitBtn');
            errorMsg.style.display = 'none';
            submitBtn.disabled = true;
            submitBtn.textContent = 'Creating...';

            const payload = {
                schoolName: document.getElementById('schoolName').value.trim(),
                subdomain: document.getElementById('subdomain').value.trim().toLowerCase().replace(/\s+/g, '-'),
                adminFullName: document.getElementById('adminFullName').value.trim(),
                adminEmail: document.getElementById('adminEmail').value.trim(),
                adminPassword: document.getElementById('adminPassword').value,
            };

            try {
                const response = await fetch('/api/onboard/create-school', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload),
                });
                const data = await response.json();

                if (!response.ok) {
                    errorMsg.textContent = data.error || 'Could not create your school. Please try again.';
                    errorMsg.style.display = 'block';
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Create School';
                    return;
                }

                // Establish a real session via the normal login flow, then land on the setup wizard.
                document.getElementById('bridgeUsername').value = payload.adminEmail;
                document.getElementById('bridgePassword').value = payload.adminPassword;
                document.getElementById('loginBridgeForm').submit();
            } catch (err) {
                errorMsg.textContent = 'Network error. Please try again.';
                errorMsg.style.display = 'block';
                submitBtn.disabled = false;
                submitBtn.textContent = 'Create School';
            }
        });
    </script>
</body>
</html>
