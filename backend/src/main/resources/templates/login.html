<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In &middot; ACADIA</title>


    <style>
        html, body {
            height: 100%;
            overflow: hidden;
        }

        body {
            background: #F7F9FC;
            color: #0F172A;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
        }

        main {
            flex: 1;
            min-height: 0;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            z-index: 1;
            padding: 16px 20px;
        }

        .login-card {
            width: 100%;
            max-width: 380px;
            max-height: 100%;
            overflow: hidden;
            background: #FFFFFF;
            border: 1px solid #E2E8F0;
            border-radius: 20px;
            padding: 24px 28px;
            box-sizing: border-box;
            box-shadow: 0 1px 3px rgba(15, 23, 42, 0.04), 0 12px 32px rgba(15, 23, 42, 0.06);
        }

        .logo-crop { width: 120px; height: 78px; overflow: hidden; margin: 0 auto; }
        .logo-crop img { width: 120px; height: auto; display: block; margin-top: -4px; }
        .brand-word { text-align: center; font-size: 16px; font-weight: 700; letter-spacing: 4px; color: #0F172A; margin-top: 2px; }

        .divider {
            border-top: 1px solid #E2E8F0;
            margin: 16px 0;
        }

        .welcome-title {
            color: #0F172A;
            font-size: 18px;
            font-weight: 600;
            text-align: center;
            margin: 0 0 4px 0;
        }

        .welcome-subtitle {
            color: #64748B;
            font-size: 13px;
            text-align: center;
            margin: 0 0 14px 0;
        }

        .form-group {
            margin-bottom: 12px;
        }

        .form-label {
            color: #334155;
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 6px;
            display: block;
            text-align: left;
        }

        .form-input {
            width: 100%;
            background: #F8FAFC;
            border: 1px solid #CBD5E1;
            border-radius: 10px;
            padding: 10px 16px;
            color: #0F172A;
            font-size: 15px;
            box-sizing: border-box;
            transition: all 0.2s ease;
            font-family: inherit;
        }

        .form-input::placeholder {
            color: #94A3B8;
        }

        .form-input:focus {
            background: #FFFFFF;
            border-color: #3B82F6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
            outline: none;
        }

        .btn-submit {
            width: 100%;
            height: 44px;
            border-radius: 10px;
            background: linear-gradient(to right, #3B82F6, #6366F1);
            color: #ffffff;
            font-weight: 600;
            font-size: 15px;
            margin-top: 12px;
            border: none;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: inherit;
        }

        .btn-submit:hover {
            filter: brightness(1.05);
        }

        .footer-text {
            color: #94A3B8;
            font-size: 11px;
            text-align: center;
            margin-top: 10px;
        }

        .error-msg {
            background: #FEF2F2;
            border: 1px solid #FECACA;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 20px;
            text-align: center;
            color: #B91C1C;
            font-size: 13px;
        }
    </style>

    <link rel="icon" type="image/png" href="/images/acadia-logo.png">
    <link rel="shortcut icon" href="/favicon.ico">
</head>
<body>
    <main>
        <div class="login-card">
            <div class="logo-crop"><img src="/images/acadia-logo.png" alt=""></div>
            <div class="brand-word">ACADIA</div>

            <div class="divider"></div>
            
            <h1 class="welcome-title" id="greetingTitle">Welcome back</h1>
            <p class="welcome-subtitle" id="greetingSubtitle">Sign in to your portal</p>
            
            <div th:if="${param.error}" class="error-msg">
                Invalid username or password. Please try again.
            </div>

            <form th:action="@{/login}" method="POST">
                <div class="form-group">
                    <label for="username" class="form-label">Username</label>
                    <input type="text" id="username" name="username" class="form-input" placeholder="Enter your username" required>
                </div>
                
                <div class="form-group" style="margin-bottom: 0;">
                    <label for="password" class="form-label">Password</label>
                    <input type="password" id="password" name="password" class="form-input" placeholder="Enter your password" required>
                </div>
                
                <button type="submit" class="btn-submit">Sign In</button>
            </form>
            
            <div class="footer-text">
                New school? <a href="/web/onboard/signup" style="color:#a5b4fc; text-decoration:none;">Create your workspace</a>
            </div>
            <div class="footer-text">Secure Portal — School Management System</div>
        </div>
    </main>

    <script>
        (function () {
            var hour = new Date().getHours();
            var timeGreeting = hour < 5 ? 'Still up?'
                : hour < 12 ? 'Good morning'
                : hour < 17 ? 'Good afternoon'
                : hour < 21 ? 'Good evening'
                : 'Working late?';

            var subtitles = [
                'Ready to pick up where you left off?',
                'Your school, one click away.',
                'Let\'s get you signed in.',
                'Everything\'s right where you left it.',
                'One step from your dashboard.'
            ];
            var subtitle = subtitles[Math.floor(Math.random() * subtitles.length)];

            document.getElementById('greetingTitle').textContent = timeGreeting;
            document.getElementById('greetingSubtitle').textContent = subtitle;
        })();
    </script>
</body>
</html>
