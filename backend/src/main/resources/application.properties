spring.application.name=backend

# Render (and most PaaS hosts) inject the port to bind via $PORT.
server.port=${PORT:8080}

spring.datasource.url=jdbc:h2:file:./data/schoolosdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.sql.init.mode=always
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# HikariCP connection pool configurations
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5

server.tomcat.accesslog.enabled=true
server.tomcat.accesslog.pattern=%h %t "%r" %s %b %D ms
spring.mvc.log-resolved-exception=true

# Dev-mode flag — set to true only in local dev to enable seed endpoints
app.dev-mode=false

# JWT signing secret — set a real random value via the JWT_SECRET env var in
# any real deployment. This default is dev-only and must not be used in prod.
app.jwt-secret=${JWT_SECRET:dev-only-insecure-default-change-in-production-please-32bytes-min}

# Demo admin password used by AcademicDataSeeder (only runs when app.dev-mode=true)
demo.admin.password=${DEMO_ADMIN_PASSWORD:PilotLaunchSecure2026!}
